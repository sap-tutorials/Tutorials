info:
  name: Deploy orchestration service
  type: http
  seq: 8

http:
  method: POST
  url: "{{ai_api_url}}/lm/deployments"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
    - name: AI-Resource-Group
      value: "{{resource_group}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "configurationId": "<CONFIGURATION_ID>"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if ( res.status == 202 ){
          let data = res.getBody();
          bru.setEnvVar("deploymentId", data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{AI_API}}/lm/deployments"
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{access_token}}
        - name: AI-Resource-Group
          value: "{{resource-group}}"
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "configurationId": "{{configurationId}}"
          }
    response:
      status: 202
      statusText: Accepted
      headers:
        - name: date
          value: Thu, 26 Mar 2026 11:44:12 GMT
        - name: location
          value: <DEPLOYMENT_URL>
        - name: content-type
          value: application/json
        - name: content-length
          value: "105"
        - name: access-control-allow-origin
          value: "null"
        - name: access-control-allow-credentials
          value: "false"
        - name: cache-control
          value: no-store, must-revalidate
        - name: x-upstream-service-time
          value: "144"
      body:
        type: json
        data: |-
          {
            "id": "<DEPLOYMENT_ID>",
            "deploymentUrl": "",
            "message": "Deployment scheduled.",
            "status": "UNKNOWN"
          }
