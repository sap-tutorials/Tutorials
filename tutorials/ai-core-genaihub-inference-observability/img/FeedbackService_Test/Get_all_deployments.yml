http:
  method: GET
  url: "{{ai_api_url}}/lm/deployments"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
    - name: AI-Resource-Group
      value: "{{resource_group}}"
    - name: Content-Type
      value: application/json
  auth: inherit

