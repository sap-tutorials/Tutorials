info:
  name: Call orchestration service
  type: http
  seq: 10

http:
  method: POST
  url: "{{deploymentUrl}}/v2/completion"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
    - name: AI-Resource-Group
      value: "{{resource_group}}"
    - name: Content-Type
      value: application/json
    - name: ai-inference-observability-persistence-mode
      value: full
    - name: ai-inference-observability-labels
      value: ext.ai.sap.com/test=true
    - name: ai-object-store-secret-name
      value: inference-observability
  body:
    type: json
    data: |-
      {
        "config": {
          "modules": {
            "prompt_templating": {
              "prompt": {
                "template": [
                  {
                    "role": "user",
                    "content": "What is the speed of light?"
                  }
                ]
              },
              "model": {
                "name": "gpt-5-mini",
                "version": "latest",
                "params": {
                  "max_completion_tokens": 3000
                }
              }
            }
          }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if ( res.status == 200 ){
          bru.setEnvVar("inferenceId", res.getHeader("ai-inference-id"));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{deploymentUrl}}/v2/completion"
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{access_token}}
        - name: AI-Resource-Group
          value: "{{resource-group}}"
        - name: Content-Type
          value: application/json
        - name: ai-inference-observability-persistence-mode
          value: full
        - name: ai-inference-observability-labels
          value: ext.ai.sap.com/test=true
          disabled: true
        - name: ai-object-store-secret-name
          value: inference-observability
      body:
        type: json
        data: |-
          {
            "config": {
              "modules": {
                "prompt_templating": {
                  "prompt": {
                    "template": [
                      {
                        "role": "user",
                        "content": "What is the speed of light?"
                      }
