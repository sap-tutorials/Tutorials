info:
  name: Create object store secret
  type: http
  seq: 5

http:
  method: POST
  url: "{{ai_api_url}}/admin/objectStoreSecrets"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
    - name: Content-Type
      value: application/json
    - name: AI-Resource-Group
      value: "{{resource_group}}"
  body:
    type: json
    data: |-
      {
        "name": "inference-observability",
        "type": "S3",
        "bucket": "hcp-b60330de-a879-4848-9a3d-0ac828f4517c",
        "endpoint": "s3.eu-central-1.amazonaws.com",
        "region": "eu-central-1",
        "pathPrefix": "testing",
        "data": {
          "AWS_ACCESS_KEY_ID": "{{AWS_ACCESS_KEY_ID}}",
          "AWS_SECRET_ACCESS_KEY": "{{AWS_SECRET_ACCESS_KEY}}" 
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

