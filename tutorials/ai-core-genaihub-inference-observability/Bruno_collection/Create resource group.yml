info:
  name: Create resource group
  type: http
  seq: 2

http:
  method: POST
  url: "{{AI_API}}/admin/resourceGroups"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "resourceGroupId": "{{resource-group}}"
      }
  auth: inherit

settings:
