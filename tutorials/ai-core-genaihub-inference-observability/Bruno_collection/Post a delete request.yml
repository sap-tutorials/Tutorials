info:
  name: Post a delete request
  type: http
  seq: 17

http:
  method: POST
  url: "{{AI_API}}/observability/inferencesDeleteRequests"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
    - name: AI-Resource-Group
      value: "{{resource-group}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "labelSelectors": [
          {
            "key": "ext.ai.sap.com/medium",
            "value": "Mobile"
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 202){
          let data = res.body;
          bru.setEnvVar("deleteRequestId", data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

